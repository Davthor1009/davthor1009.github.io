    <!--banner-->
    <div class="banner bg-primary">
        <div class="container">
            <h1 class="text text-center text-white">Contact Us</h1>
        </div>
    </div>
    <!--form contact-->
    <div class="container my-5">
        <form action="" method="post">
            <section class="contact-section dark-grey-text mb-5">
                <div class="card">
                    <div class="row">
                        <div class="col-lg-8">
                            <div id="form-p" class="card-body form">
                                <h3 class="font-weight-bold dark-grey-text mt-4"><i
                                        class="fas fa-envelope pr-2 mr-1"></i>Write to us:</h3>
    
                                <div class="row">
                                    <div class="col-md-6">
                                        <div  class="md-form mb-0">
                                            <input type="text" id="form-name" class="form-control">
                                            <label for="form-name" class="txt">Your name</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div id="form-p" class="md-form mb-0">
                                            <input type="text" id="form-email" class="form-control">
                                            <label for="form-email" class="txt">Your email</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div id="form-p" class="md-form mb-0">
                                            <input type="text" id="form-phone" class="form-control">
                                            <label for="form-phone" class="txt">Your phone</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-12">
                                        <div id="form-p" class="md-form mb-0">
                                            <textarea id="form-message" class="form-control md-textarea" rows="3"></textarea>
                                            <label for="form-message" class="txt">Your message</label><br>
                                            <button class="btn btn-primary btn-circle btn-md"><i class="far fa-paper-plane"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4">
                            <div class="card-body bg-primary contact text-center h-100 text-white">
                                <h3 class="font-weight-bold my-4 pb-2">Contact information</h3>
                                <ul class="text-lg-left list-unstyled ml-4">
                                    <li>
                                        <p><i class="fas fa-map-marker-alt pr-2"></i>Bogotá, 94126, COL</p>
                                    </li>
                                    <li>
                                        <p><i class="fas fa-phone pr-2"></i>+ 57 601 123 45 67</p>
                                    </li>
                                    <li>
                                        <p><i class="fas fa-envelope pr-2"></i>contact@example.com</p>
                                    </li>
                                </ul>
                                <hr class="hr-light my-4">
                                <ul class="list-inline text-center list-unstyled">
                                    <li class="list-inline-item">
                                        <a class="p-2 fa-lg tw-ic text-white">
                                            <i class="fab fa-twitter"></i>
                                        </a>
                                    </li>
                                    <li class="list-inline-item">
                                        <a class="p-2 fa-lg li-ic text-white">
                                            <i class="fab fa-linkedin-in"> </i>
                                        </a>
                                    </li>
                                    <li class="list-inline-item">
                                        <a class="p-2 fa-lg ins-ic text-white">
                                            <i class="fab fa-instagram"> </i>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </form>
    </div>
